{% extends "base.html" %}
{% block title %}Edit Expense{% endblock %}

{% block content %}
{% if error %}<div class="error-banner">{{ error }}</div>{% endif %}
<div class="panel">
  <h2>Edit expense</h2>
  <form method="post" class="form-grid">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
    <div>
      <label>Amount ($)</label>
      <input type="number" step="0.01" min="0.01" name="amount" value="{{ expense.amount }}" required>
    </div>
    <div>
      <label>Category</label>
      <input type="text" name="category" value="{{ expense.category }}" required>
    </div>
    <div>
      <label>Date</label>
      <input type="date" name="date" value="{{ expense.date }}" required>
    </div>
    <div>
      <label>Note</label>
      <input type="text" name="note" value="{{ expense.note }}">
    </div>
    <button type="submit">Save</button>
  </form>
  <p class="back-link"><a href="{{ url_for('index') }}">← Back without saving</a></p>
</div>
{% endblock %}
