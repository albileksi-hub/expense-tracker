<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Expense Tracker{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💸</text></svg>">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <a href="{{ url_for('home') }}" style="text-decoration:none; color:inherit;"><h1>💸 Expense Tracker</h1></a>
    <nav>
      {% if session.user %}
        <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' }}">Expenses</a>
        <a href="{{ url_for('summary') }}" class="{{ 'active' if request.endpoint == 'summary' }}">Summary</a>
        <a href="{{ url_for('budgets') }}" class="{{ 'active' if request.endpoint == 'budgets' }}">Budgets</a>
        <a href="{{ url_for('insights_view') if is_pro else url_for('upgrade') }}"
           class="{{ 'active' if request.endpoint in ('insights_view', 'upgrade') }}">✨ Insights</a>
        <a href="{{ url_for('export') }}">Export CSV</a>
        <span class="nav-user">👤 {{ session.user }}{% if is_pro %} · Pro{% endif %}</span>
        <form class="inline" method="post" action="{{ url_for('logout') }}">
          <button type="submit" class="small secondary">Log out</button>
        </form>
      {% else %}
        <a href="{{ url_for('login') }}" class="{{ 'active' if request.endpoint == 'login' }}">Log in</a>
        <a href="{{ url_for('register') }}"><button type="button" class="small">Sign up</button></a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
